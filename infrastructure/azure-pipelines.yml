trigger:
  - main

pool:
  name: "Default"

variables:
  buildConfiguration: "Release"

steps:
  # 0. ADIM: .NET 8 SDK Kur
  - script: |
      curl -L https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
      chmod +x dotnet-install.sh
      ./dotnet-install.sh --channel 8.0
      echo "##vso[task.prependpath]$HOME/.dotnet"
    displayName: "Install .NET 8 SDK"

  # 1. ADIM: Build ve Publish
  - task: DotNetCoreCLI@2
    displayName: "Build and Publish"
    inputs:
      command: "publish"
      publishWebProjects: false
      projects: "SafeRoad/SafeRoad.WebApi/SafeRoad.WebApi.csproj"
      arguments: "--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/SafeRoad.WebApi"
      zipAfterPublish: true

  # 2. ADIM: Artifacts yükle
  - task: PublishBuildArtifacts@1
    displayName: "Upload Artifacts"
    inputs:
      PathtoPublish: "$(Build.ArtifactStagingDirectory)"
      ArtifactName: "drop"
      publishLocation: "Container"

  # 3. ADIM: Azure App Service'e Deploy
  - task: AzureWebApp@1
    displayName: "Deploy to Azure App Service"
    inputs:
      azureSubscription: "Azure for Students"
      appType: "webAppLinux"
      appName: "saferoad"
      package: "$(Build.ArtifactStagingDirectory)/**/*.zip"
